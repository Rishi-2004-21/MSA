services:
  - type: web
    name: msa-agent
    runtime: node
    rootDir: MSA
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: CALENDLY_URL
        sync: false
