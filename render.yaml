services:
  - type: web
    name: msa-app
    runtime: node
    rootDir: MSA
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        scope: all
      - key: SMTP_HOST
        scope: all
      - key: SMTP_PORT
        scope: all
      - key: SMTP_USER
        scope: all
      - key: SMTP_PASSWORD
        scope: all
