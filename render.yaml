services:
  - type: web
    name: msa-agent
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: kolanusnehareddie@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: kolanusnehareddie@gmail.com
      - key: FROM_NAME
        value: Ushnik Technologies
      - key: OWNER_EMAIL
        value: kolanusnehareddie@gmail.com
      - key: APP_URL
        sync: false
      - key: WHATSAPP_NUMBER
        value: "+91-6304757347"
      - key: CALENDLY_URL
        value: https://calendly.com/rishienjamuri/30min
